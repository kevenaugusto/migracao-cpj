[loggers]
keys=root,migracao

[handlers]
keys=consoleHandler,rotatingFile

[formatters]
keys=simpleFormatter

[logger_root]
level=INFO
handlers=consoleHandler,rotatingFile

[logger_migracao]
level=DEBUG
handlers=consoleHandler,rotatingFile
qualname=migracao
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=simpleFormatter
args=(sys.stdout,)

[handler_rotatingFile]
class=handlers.RotatingFileHandler
level=DEBUG
formatter=simpleFormatter
args=('logs/migracao.log', 'a', 5242880, 5)

[formatter_simpleFormatter]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s
